<header class="header">
    <div class="container">

        <div class="header-top">
            <div class="header-top-left">
                <button class="btn-search" (click)="toggleSearch()">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>
            <div class="header-top-logo">
                <a routerLink="/home">
                    <img class="img img-logo img-logo-header" src="logo.png" alt="background logo">
                </a>
            </div>
            <div class="header-top-right">
                <!-- Ícono de usuario con dropdown -->
                <div class="user-icon-wrapper">
                    <button class="btn-user-icon header-i" (click)="onUserIconClick()">
                        <i class="fa-solid fa-user"></i>
                    </button>
                    <!-- Dropdown de usuario (siempre en DOM, oculto con CSS) -->
                    <div class="user-dropdown" [class.open]="showUserDropdown && user">
                        <div class="user-dropdown-info">
                            <span class="user-dropdown-name">{{ user?.username || user?.email }}</span>
                            <span class="user-dropdown-role">{{ user?.role }}</span>
                        </div>
                        <hr class="user-dropdown-divider">
                        <button class="user-dropdown-logout" (click)="onLogout()">
                            <i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión
                        </button>
                    </div>
                </div>
                <a routerLink="/favorites"><i class="fa-solid fa-heart header-i"></i></a>
                <a routerLink="/cart"><i class="fa-solid fa-cart-shopping header-i"></i></a>
                <a routerLink="/home"><i class="fa-solid fa-bars mobile"></i></a>
            </div>
        </div>

        <!-- Barra de búsqueda -->
        @if (showSearch) {
        <div class="search-bar">
            <input type="text" class="search-input" placeholder="Buscar productos..." [(ngModel)]="searchQuery"
                (keyup.enter)="search()">
            <button class="search-btn" (click)="search()">
                <i class="fa-solid fa-magnifying-glass"></i>
            </button>
            <button class="search-close" (click)="toggleSearch()">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>
        }

        <nav class="menu-nav nav-navbar">
            <ul class="menu-main">
                <li><a href="#" class="menu__link">RINGS</a></li>
                <li><a href="#" class="menu__link">EARRINGS</a></li>
                <li><a href="#" class="menu__link">BRACELETS</a></li>
                <li><a href="#" class="menu__link">NECKLACES</a></li>
            </ul>
        </nav>

    </div>
</header>
