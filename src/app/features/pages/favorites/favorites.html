@if (loading) {
<div class="fav-loading">
    <div class="spinner"></div>
    <p>Cargando favoritos...</p>
</div>
}

@if (!loading) {
<section class="favorites-page">
    <h1 class="fav-title">
        <i class="fa-solid fa-heart"></i>
        Mis Favoritos
    </h1>

    @if (!favorites?.products?.length) {
    <div class="fav-empty">
        <i class="fa-regular fa-heart"></i>
        <h2>Aún no tienes favoritos</h2>
        <p>Explora productos y marca tus joyas preferidas con el corazón.</p>
        <a routerLink="/home" class="btn-explore">Explorar</a>
    </div>
    } @else {
    <div class="fav-grid">
        @for (product of favorites.products; track product._id) {
        <div class="fav-card-wrapper">
            <app-product-card [name]="product.name" [price]="product.price" [image]="product.urlImage"
                [category]="'Favorito'" [productId]="product._id" />
            <button class="fav-remove-btn" (click)="removeFavorite(product._id)">
                <i class="fa-solid fa-heart-crack"></i>
                Quitar
            </button>
        </div>
        }
    </div>
    }
</section>
}
