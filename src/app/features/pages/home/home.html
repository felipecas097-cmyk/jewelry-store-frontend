<main class="main">
    <section class="main-container modelos-container">
        <!-- div.carousel>div.group>div.cardf$t*6 ==> crea varios div con CONTENIDO ascendente -->
        <!-- #carouselEl — referencia para que el TypeScript acceda al DOM -->
        <div class="carousel" #carouselEl>
            <div class="group">
                <div class="card card1">
                    <img class="modelos-container-img" ngSrc="backgroud-modelos-1.png" fill priority
                        alt="backgroud-modelos-1">
                    <h1>Marriage Promise</h1>
                </div>
                <div class="card card2">
                    <img class="modelos-container-img" ngSrc="backgroud-modelos-2.png" fill alt="backgroud-modelos-2">
                    <h1>A Touch of Royalty</h1>
                </div>
                <div class="card card3">
                    <img class="modelos-container-img" ngSrc="backgroud-modelos-3.png" fill alt="backgroud-modelos-3">
                    <h1>Soft Elegance</h1>
                </div>
                <div class="card card4">
                    <img class="modelos-container-img" ngSrc="backgroud-modelos-4.png" fill alt="backgroud-modelos-4">
                    <h1>Crafted Confidence</h1>
                </div>
                <div class="card card5">
                    <img class="modelos-container-img" ngSrc="backgroud-modelos-5.png" fill alt="backgroud-modelos-5">
                    <h1>Own the Moment</h1>
                </div>
            </div>
        </div>
        <!-- div.carousel>div.group>div.card.card$*5  ==> crea varios div con CLASE ascendente -->
    </section>

    <section class="categories-grid">
        <a routerLink="/necklaces" class="category-card necklaces">
            <div class="category-overlay"></div>
            <h2 class="main_tittle">Necklaces</h2>
        </a>
        <a routerLink="/bracelets" class="category-card bracelets">
            <div class="category-overlay"></div>
            <h2 class="main_tittle">Bracelets</h2>
        </a>
        <a routerLink="/earrings" class="category-card earrings">
            <div class="category-overlay"></div>
            <h2 class="main_tittle">Earrings</h2>
        </a>
        <a routerLink="/rings" class="category-card rings">
            <div class="category-overlay"></div>
            <h2 class="main_tittle">Rings</h2>
        </a>
    </section>
</main>
